name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, test, web build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare env for build
        run: |
          cp .env.example .env
          cp apps/web/.env.example apps/web/.env

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build web
        run: pnpm build:web
        env:
          # Next build reads env files; CI has no secrets — use safe placeholders.
          DATABASE_URL: file:../../data/aperio-j-ci.db

  installers:
    name: Build desktop and mobile installers
    needs: verify
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/installers.yml

  publish:
    name: Publish installers to GitHub Releases
    needs: installers
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare release filenames
        run: |
          node scripts/prepare-release-installers.mjs release-assets release
          if [ -f release/Aperio-J-android.apk ]; then
            echo "has_apk=true" >> "$GITHUB_ENV"
          else
            echo "has_apk=false" >> "$GITHUB_ENV"
            echo "No Android APK — set repository secret APERIO_J_WEB_URL to enable."
          fi
          ls -la release/

      - name: Publish rolling latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest installers
          prerelease: true
          make_latest: true
          body: |
            Rolling CI build — updated on every push to `main`.

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows | `Aperio-J-windows-setup.exe` | Thin shell (~15 MB) when release URL configured |
            | Linux | `Aperio-J-linux-x86_64.AppImage` | Thin shell; make executable (`chmod +x`) if needed |
            | macOS (Apple Silicon) | `Aperio-J-macos-aarch64.dmg` | Ad-hoc signed — right-click → Open on first launch |
            | macOS (Intel) | `Aperio-J-macos-x64.dmg` | Same as arm64 build |
            | Android | `Aperio-J-android.apk` | When `APERIO_J_WEB_URL` secret or `apps/desktop/release-web-url.txt` is set |

            For Android friends without the APK: open your Render URL in Chrome (Add to Home screen).
          files: |
            release/*
          overwrite_files: true
