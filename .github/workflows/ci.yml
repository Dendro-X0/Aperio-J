name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, test, web build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare env for build
        run: |
          cp .env.example .env
          cp apps/web/.env.example apps/web/.env

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build web
        run: pnpm build:web
        env:
          # Next build reads env files; CI has no secrets — use safe placeholders.
          DATABASE_URL: file:../../data/aperio-j-ci.db

  installers:
    name: Build desktop and mobile installers
    needs: verify
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/installers.yml

  publish:
    name: Publish installers to GitHub Releases
    needs: installers
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare release filenames
        run: |
          mkdir -p release
          EXE=$(find release-assets -name '*.exe' | head -1)
          APK=$(find release-assets -name '*.apk' | head -1)
          test -n "$EXE" || { echo "Windows installer missing"; exit 1; }
          test -n "$APK" || { echo "Android APK missing"; exit 1; }
          cp "$EXE" release/Aperio-J-windows-setup.exe
          cp "$APK" release/Aperio-J-android.apk
          ls -la release/

      - name: Publish rolling latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 最新安装包 Latest installers
          prerelease: true
          make_latest: true
          body: |
            自动 CI 构建的正式安装包（每次推送到 main 更新）。

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `Aperio-J-windows-setup.exe` | NSIS 安装程序 |
            | Android | `Aperio-J-android.apk` | 自签名 release APK，需开启「允许安装未知来源」 |

            Android 使用仓库内 OSS 上传密钥签名，无需应用市场或备案即可侧载安装。
          files: |
            release/Aperio-J-windows-setup.exe
            release/Aperio-J-android.apk
          overwrite_files: true
