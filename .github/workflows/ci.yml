name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, test, web build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare env for build
        run: |
          cp .env.example .env
          cp apps/web/.env.example apps/web/.env

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build web
        run: pnpm build:web
        env:
          # Next build reads env files; CI has no secrets — use safe placeholders.
          DATABASE_URL: file:../../data/aperio-j-ci.db

  installers:
    name: Build desktop and mobile installers
    needs: verify
    if: github.event_name == 'push'
    uses: ./.github/workflows/installers.yml
