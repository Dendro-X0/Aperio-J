name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify (same as CI)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env && cp apps/web/.env.example apps/web/.env
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build:web
        env:
          DATABASE_URL: file:../../data/aperio-j-ci.db

  installers:
    name: Build desktop and mobile installers
    needs: verify
    uses: ./.github/workflows/installers.yml

  github-release:
    name: Publish GitHub Release
    needs: installers
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
