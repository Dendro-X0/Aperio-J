name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify (same as CI)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env && cp apps/web/.env.example apps/web/.env
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build:web
        env:
          DATABASE_URL: file:../../data/aperio-j-ci.db

  desktop-windows:
    name: Desktop (Windows)
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Shorten workspace path (NSIS 260-char limit)
        run: subst X: ${{ github.workspace }}

      - name: Prepare env for build
        shell: cmd
        run: |
          copy X:\.env.example X:\.env
          copy X:\apps\web\.env.example X:\apps\web\.env

      - name: Build desktop installer
        shell: cmd
        run: pnpm build:desktop
        working-directory: X:\
        env:
          DATABASE_URL: file:../../data/aperio-j-ci.db

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aperio-j-desktop-windows
          path: |
            X:/apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Remove drive subst
        if: always()
        run: subst X: /d

  android:
    name: Android APK
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: cp .env.example .env && cp apps/web/.env.example apps/web/.env

      - name: Build Android APK
        run: pnpm build:android
        env:
          DATABASE_URL: file:../../data/aperio-j-ci.db
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aperio-j-android
          path: |
            apps/desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            apps/desktop/src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: warn

  github-release:
    name: Publish GitHub Release
    needs: [desktop-windows, android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
