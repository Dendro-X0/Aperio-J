name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify (same as CI)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env && cp apps/web/.env.example apps/web/.env
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build:web
        env:
          DATABASE_URL: file:../../data/aperio-j-ci.db

  installers:
    name: Build desktop and mobile installers
    needs: verify
    uses: ./.github/workflows/installers.yml

  github-release:
    name: Publish GitHub Release
    needs: installers
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare release filenames
        run: |
          mkdir -p release
          EXE=$(find release-assets -name '*.exe' | head -1)
          test -n "$EXE" || { echo "Windows installer missing"; exit 1; }
          cp "$EXE" release/Aperio-J-windows-setup.exe
          APK=$(find release-assets -name '*.apk' | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" release/Aperio-J-android.apk
            echo "has_apk=true" >> "$GITHUB_ENV"
          else
            echo "has_apk=false" >> "$GITHUB_ENV"
          fi
          ls -la release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
          generate_release_notes: true
          body: |
            ## Installers

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows | `Aperio-J-windows-setup.exe` | Local SQLite — works offline |
            | Android | `Aperio-J-android.apk` | Shell opens your hosted web app — only attached when `APERIO_J_WEB_URL` secret or `apps/desktop/release-web-url.txt` is configured |

            Android missing? Set [GitHub secret `APERIO_J_WEB_URL`](https://github.com/${{ github.repository }}/settings/secrets/actions) or commit your Render URL to `apps/desktop/release-web-url.txt`, then re-run the Release workflow.
