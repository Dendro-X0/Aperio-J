name: Installers

on:
  workflow_call:

jobs:
  desktop-windows:
    name: Desktop installer (Windows)
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Shorten workspace path (NSIS 260-char limit)
        run: 'subst X: ${{ github.workspace }}'

      - name: Prepare env for build
        shell: cmd
        run: |
          copy X:\.env.example X:\.env
          copy X:\apps\web\.env.example X:\apps\web\.env

      - name: Resolve release web URL
        id: release_web
        shell: bash
        env:
          WEB_URL: ${{ secrets.APERIO_J_WEB_URL || vars.APERIO_J_WEB_URL }}
        run: |
          URL="$WEB_URL"
          if [ -z "$URL" ]; then
            URL=$(node scripts/resolve-release-web-url.mjs 2>/dev/null || true)
          fi
          if [ -n "$URL" ]; then
            echo "url=$URL" >> "$GITHUB_OUTPUT"
            echo "Desktop thin shell URL: $URL"
          else
            echo "No release web URL — building full local desktop (~50MB)"
          fi

      - name: Build desktop installer
        shell: cmd
        run: node scripts\build-desktop-ci.mjs
        working-directory: X:\apps\desktop
        env:
          APERO_J_WEB_URL: ${{ steps.release_web.outputs.url }}
          DATABASE_URL: file:../../data/aperio-j-ci.db
          TAURI_BUILD: "1"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: aperio-j-desktop-windows
          path: |
            X:/apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Remove drive subst
        if: always()
        run: 'subst X: /d'

  android:
    name: Mobile installer (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Resolve NDK path
        id: ndk
        run: echo "path=${ANDROID_HOME}/ndk/27.0.12077973" >> "$GITHUB_OUTPUT"

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: cp .env.example .env && cp apps/web/.env.example apps/web/.env

      - name: Resolve Android web URL
        id: android_web
        env:
          WEB_URL: ${{ secrets.APERIO_J_WEB_URL || vars.APERIO_J_WEB_URL }}
        run: |
          URL="$WEB_URL"
          if [ -z "$URL" ]; then
            URL=$(node scripts/resolve-release-web-url.mjs 2>/dev/null || true)
          fi
          if [ -z "$URL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No Android web URL — set secret APERIO_J_WEB_URL or apps/desktop/release-web-url.txt"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "url=$URL" >> "$GITHUB_OUTPUT"
            echo "Android APK will open: $URL"
          fi

      - name: Preflight Android toolchain
        if: steps.android_web.outputs.skip != 'true'
        run: bash scripts/android-preflight.sh
        env:
          NDK_HOME: ${{ steps.ndk.outputs.path }}

      - name: Build Android APK (signed release)
        if: steps.android_web.outputs.skip != 'true'
        working-directory: apps/desktop
        run: node scripts/build-android-ci.mjs --target aarch64 --apk
        env:
          DATABASE_URL: file:../../data/aperio-j-ci.db
          APERIO_J_WEB_URL: ${{ steps.android_web.outputs.url }}
          NDK_HOME: ${{ steps.ndk.outputs.path }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          APERIO_J_ANDROID_KEYSTORE_BASE64: ${{ secrets.APERIO_J_ANDROID_KEYSTORE_BASE64 }}
          APERIO_J_ANDROID_KEY_PASSWORD: ${{ secrets.APERIO_J_ANDROID_KEY_PASSWORD }}

      - name: Upload Android build log on failure
        if: failure() && steps.android_web.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: aperio-j-android-build-log
          path: |
            android-build.log
            android-build-failure.txt
          if-no-files-found: ignore

      - name: Upload Android installer
        if: steps.android_web.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: aperio-j-android
          path: |
            apps/desktop/src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk
          if-no-files-found: error
